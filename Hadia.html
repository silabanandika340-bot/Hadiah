<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadiah Spesial Untukmu</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        color: #ff4d6d;
    }

    p {
        font-size: 18px;
        color: #555;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background-color: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #e60039;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% {transform: translateY(100vh) scale(0.5);}
        100% {transform: translateY(-10vh) scale(1.2);}
    }
</style>
</head>
<body>

<div class="card">
    <h1>Untuk Kamu 🤍</h1>
    <p>
        Dari sekian banyak orang di dunia ini,  
        aku bersyukur bisa kenal kamu.  
        Senyummu itu sederhana, tapi efeknya luar biasa.
    </p>
    <button onclick="tampilPesan()">Klik Aku</button>
    <p id="pesanRahasia"></p>
</div>

<script>
function tampilPesan() {
    document.getElementById("pesanRahasia").innerHTML =
        "Aku nggak jago bikin puisi, tapi aku jago mengagumi kamu 😊";
}

// Efek hati jatuh
setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() *100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 300);
</script>

</body>
  </html>
